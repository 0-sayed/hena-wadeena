# Hena Wadeena — Nginx API Gateway
# Listens on :80 (mapped to :8000 externally via docker-compose)

upstream identity {
    server identity:8001;
    keepalive 32;
}

upstream market {
    server market:8002;
    keepalive 32;
}

upstream guide_booking {
    server guide-booking:8003;
    keepalive 32;
}

upstream map_svc {
    server map:8004;
    keepalive 32;
}

upstream ai {
    server ai:8005;
    keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=global:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=ai:10m rate=30r/m;

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Common proxy settings (inherited by all location blocks)
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # ── Block ALL /internal/* routes from external access ──────────────────
    location ~ ^/api/v1/internal/ {
        return 403;
    }

    # ── Identity Service (/api/v1/auth/*, /api/v1/users/*, etc.) ───────────
    location ~ ^/api/v1/(auth|users|profile|kyc|notifications|saved-items)/ {
        limit_req zone=global burst=20 nodelay;

        # Stricter rate limit on auth endpoints
        location ~ ^/api/v1/auth/(login|register|forgot-password) {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://identity;
        }

        proxy_pass http://identity;
    }

    # ── Market Service (/api/v1/listings/*, /api/v1/market/*, etc.) ─────────
    location ~ ^/api/v1/(listings|market|prices|business|opportunities|investments)/ {
        limit_req zone=global burst=20 nodelay;
        proxy_pass http://market;
    }

    # ── Guide-Booking Service (/api/v1/guides/*, /api/v1/bookings/*, etc.) ──
    location ~ ^/api/v1/(guides|packages|bookings|attractions)/ {
        limit_req zone=global burst=20 nodelay;
        proxy_pass http://guide_booking;
    }

    # ── Map Service (/api/v1/pois/*, /api/v1/carpool/*) ────────────────────
    location ~ ^/api/v1/(pois|carpool)/ {
        limit_req zone=global burst=20 nodelay;
        proxy_pass http://map_svc;
    }

    # ── AI Service (/api/v1/chat/*, /api/v1/ai/*) ──────────────────────────
    location ~ ^/api/v1/(chat|ai)/ {
        limit_req zone=ai burst=10 nodelay;
        # SSE support
        proxy_read_timeout 300s;
        proxy_buffering off;
        proxy_cache off;
        proxy_pass http://ai;
    }

    # ── Search (/api/v1/search) ─────────────────────────────────────────────
    location ~ ^/api/v1/search {
        limit_req zone=global burst=20 nodelay;
        proxy_pass http://identity;
    }

    # ── Gateway Health ──────────────────────────────────────────────────────
    location /health {
        default_type application/json;
        return 200 '{"status":"ok","service":"gateway"}';
    }

    # ── Default ─────────────────────────────────────────────────────────────
    location / {
        return 404;
    }
}
