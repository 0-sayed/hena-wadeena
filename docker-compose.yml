name: hena-wadeena

x-nestjs-service: &nestjs-service
  restart: unless-stopped
  env_file: .env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - hena-internal

x-nestjs-healthcheck: &nestjs-healthcheck
  interval: 15s
  timeout: 10s
  retries: 5

services:
  # =============================================================================
  # PROFILE STRATEGY
  # =============================================================================
  # Services are gated by profiles so `docker compose up` (and `wtc start`) only
  # starts infrastructure by default — no app containers needed for local dev.
  #
  # Default (no profile):  postgres, redis, qdrant
  #   → Use for local dev. Run NestJS via `pnpm dev`, frontend via Vite directly.
  #
  # Profile "prod":        identity, market, guide-booking, map, gateway, caddy
  #   → Full backend stack. Used by CI/CD deploy.yml (services named explicitly).
  #
  # Profile "ai":          ai, mongodb
  #   → AI service + its DB. Separate profile because uv sync is slow and AI is
  #     optional for most dev workflows. Full prod: COMPOSE_PROFILES=prod,ai
  #
  # NOTE: deploy.yml names services explicitly in `docker compose up` — profiles
  # do not affect production deploys.
  # =============================================================================

  # --- Infrastructure ---
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: wadeena_db
      POSTGRES_USER: ${POSTGRES_USER:-hena}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is not set}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-schemas.sql:/docker-entrypoint-initdb.d/00-init-schemas.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-hena} -d wadeena_db']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hena-internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is not set}
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD-SHELL', 'REDISCLI_AUTH=$REDIS_PASSWORD redis-cli ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hena-internal

  qdrant:
    image: qdrant/qdrant:v1.12.0
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test:
        [
          'CMD',
          'bash',
          '-c',
          'exec 3<>/dev/tcp/127.0.0.1/6333 && printf "GET /readyz HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3 && IFS= read -r status <&3 && [[ $$status == *" 200 "* ]]',
        ]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - hena-internal

  mongodb:
    image: mongo:7
    restart: unless-stopped
    profiles: [ai]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:?MONGO_INITDB_ROOT_USERNAME is not set}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?MONGO_INITDB_ROOT_PASSWORD is not set}
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'mongosh --quiet --username ${MONGO_INITDB_ROOT_USERNAME} --password ${MONGO_INITDB_ROOT_PASSWORD} --authenticationDatabase admin --eval "db.adminCommand({ ping: 1 }).ok" | grep 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hena-internal

  # --- NestJS Services ---
  identity:
    <<: *nestjs-service
    profiles: [prod]
    image: ghcr.io/0-sayed/hena-wadeena/identity:latest
    build:
      context: .
      dockerfile: services/identity/Dockerfile
    environment:
      SERVICE_NAME: identity
      PORT: 8001
      DB_SCHEMA: identity
    healthcheck:
      <<: *nestjs-healthcheck
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(\"http://localhost:8001/health\").then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"',
        ]

  market:
    <<: *nestjs-service
    profiles: [prod]
    image: ghcr.io/0-sayed/hena-wadeena/market:latest
    build:
      context: .
      dockerfile: services/market/Dockerfile
    environment:
      SERVICE_NAME: market
      PORT: 8002
      DB_SCHEMA: market
    healthcheck:
      <<: *nestjs-healthcheck
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(\"http://localhost:8002/health\").then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"',
        ]

  guide-booking:
    <<: *nestjs-service
    profiles: [prod]
    image: ghcr.io/0-sayed/hena-wadeena/guide-booking:latest
    build:
      context: .
      dockerfile: services/guide-booking/Dockerfile
    environment:
      SERVICE_NAME: guide-booking
      PORT: 8003
      DB_SCHEMA: guide_booking
    healthcheck:
      <<: *nestjs-healthcheck
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(\"http://localhost:8003/health\").then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"',
        ]

  map:
    <<: *nestjs-service
    profiles: [prod]
    image: ghcr.io/0-sayed/hena-wadeena/map:latest
    build:
      context: .
      dockerfile: services/map/Dockerfile
    environment:
      SERVICE_NAME: map
      PORT: 8004
      DB_SCHEMA: map
    healthcheck:
      <<: *nestjs-healthcheck
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(\"http://localhost:8004/health\").then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"',
        ]

  ai:
    <<: *nestjs-service
    profiles: [ai]
    image: ghcr.io/0-sayed/hena-wadeena/ai:latest
    build:
      context: services/ai
      dockerfile: Dockerfile
    environment:
      SERVICE_NAME: ai
      PORT: 8005
      DB_SCHEMA: ai
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/${MONGODB_DB_NAME:-nakheel_db}?authSource=admin
      BOOTSTRAP_KNOWLEDGE_BASE_ON_STARTUP: ${BOOTSTRAP_KNOWLEDGE_BASE_ON_STARTUP:-true}
      BOOTSTRAP_KNOWLEDGE_BASE_FILE: ${BOOTSTRAP_KNOWLEDGE_BASE_FILE:-./nakheel/bootstrap/datasets/new_valley_2026.json}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    healthcheck:
      <<: *nestjs-healthcheck
      test: ['CMD-SHELL', 'curl -sf http://localhost:8005/health || exit 1']
      start_period: 120s
      retries: 12

  # --- Gateway ---
  gateway:
    image: ghcr.io/0-sayed/hena-wadeena/gateway:latest
    build:
      context: gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    profiles: [prod]
    environment:
      - NGINX_ENVSUBST_FILTER=^CORS_|^MAX_|^RATE_
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - MAX_BODY_SIZE=${MAX_BODY_SIZE:-10m}
      - RATE_GLOBAL=${RATE_GLOBAL:-100r/m}
      - RATE_AUTH=${RATE_AUTH:-5r/m}
      - RATE_AI=${RATE_AI:-30r/m}
    expose:
      - '80'
    ports:
      - '${GATEWAY_PORT:-8000}:80'
    depends_on:
      identity:
        condition: service_started
      market:
        condition: service_started
      guide-booking:
        condition: service_started
      map:
        condition: service_started
    networks:
      - hena-internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    profiles: [prod]
    ports:
      - '${CADDY_HTTP_PORT:-80}:80'
      - '${CADDY_HTTPS_PORT:-443}:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /var/www/hena-wadeena:/srv/hena-wadeena:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - gateway
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO /dev/null http://127.0.0.1:2019/config/ 2>/dev/null']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - hena-internal

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  mongo-data:
  caddy-data:
  caddy-config:

networks:
  hena-internal:
    driver: bridge
