name: Setup Node + pnpm
description: Install pnpm, setup Node.js, and install dependencies

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b # v5.0.0
    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: '22'
        cache: 'pnpm'
    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
    - name: Build shared packages
      shell: bash
      run: pnpm --filter @hena-wadeena/types build && pnpm --filter @hena-wadeena/nest-common build
