---
name: Release

'on':
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Verify tag commit is on main
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"

      - name: Generate Changelog
        id: changelog
        uses: requarks/changelog-action@6d71e098526ee17bae963f058d34cd763378337f # v1
        with:
          token: ${{ github.token }}
          tag: ${{ github.ref_name }}
          excludeTypes: build,style,ci,chore

      - name: Create GitHub Release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changes }}
          token: ${{ github.token }}
          allowUpdates: true

      - name: Open CHANGELOG.md pull request
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          commit_message: 'docs: update CHANGELOG.md for ${{ github.ref_name }} [skip ci]'
          title: 'docs: update CHANGELOG.md for ${{ github.ref_name }}'
          body: |
            Automated CHANGELOG.md update generated by the release workflow for `${{ github.ref_name }}`.
          branch: release/changelog-${{ github.ref_name }}
          base: main
          add-paths: CHANGELOG.md
          delete-branch: true
