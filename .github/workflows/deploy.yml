---
name: Deploy

'on':
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build-images:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [ci]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: identity
            context: .
            dockerfile: services/identity/Dockerfile
          - service: market
            context: .
            dockerfile: services/market/Dockerfile
          - service: guide-booking
            context: .
            dockerfile: services/guide-booking/Dockerfile
          - service: map
            context: .
            dockerfile: services/map/Dockerfile
          - service: ai
            context: services/ai
            dockerfile: Dockerfile
          - service: gateway
            context: gateway
            dockerfile: Dockerfile
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/hena-wadeena/${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/hena-wadeena/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Deploy to Contabo
    runs-on: ubuntu-latest
    needs: [build-images]
    environment: production
    timeout-minutes: 12
    steps:
      - name: Validate required deploy secrets
        run: |
          : "${MONGO_INITDB_ROOT_USERNAME:?MONGO_INITDB_ROOT_USERNAME is not set}"
          : "${MONGO_INITDB_ROOT_PASSWORD:?MONGO_INITDB_ROOT_PASSWORD is not set}"
          : "${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is not set}"
          : "${OPENAI_API_KEY:?OPENAI_API_KEY is not set}"
        env:
          MONGO_INITDB_ROOT_USERNAME: ${{ secrets.MONGO_INITDB_ROOT_USERNAME }}
          MONGO_INITDB_ROOT_PASSWORD: ${{ secrets.MONGO_INITDB_ROOT_PASSWORD }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,DEPLOY_SHA,MONGO_INITDB_ROOT_USERNAME,MONGO_INITDB_ROOT_PASSWORD,JWT_ACCESS_SECRET,OPENAI_API_KEY,CORS_ORIGINS,SEED_PASSWORD,CADDY_HTTP_PORT,CADDY_HTTPS_PORT
          script: |
            set -euo pipefail
            cd /opt/hena-wadeena

            echo "==> Logging into GHCR"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            echo "==> Fixing file permissions (containers may run as root)"
            docker run --rm -v "$(pwd):/fix-perms" alpine:3.21 chown -R "$(id -u):$(id -g)" /fix-perms

            echo "==> Resetting working tree"
            git reset --hard
            git clean -fd -e .env

            echo "==> Checking out built commit"
            git fetch origin main
            git checkout "$DEPLOY_SHA"

            echo "==> Syncing AI/auth secrets into .env"
            touch .env
            upsert_env() {
              local key="$1"
              local value="$2"
              grep -v "^${key}=" .env > .env.tmp || true
              printf '%s=%s\n' "$key" "$value" >> .env.tmp
              mv .env.tmp .env
            }
            upsert_env "MONGO_INITDB_ROOT_USERNAME" "$MONGO_INITDB_ROOT_USERNAME"
            upsert_env "MONGO_INITDB_ROOT_PASSWORD" "$MONGO_INITDB_ROOT_PASSWORD"
            upsert_env "MONGODB_URI" "mongodb://$MONGO_INITDB_ROOT_USERNAME:$MONGO_INITDB_ROOT_PASSWORD@mongodb:27017/nakheel_db?authSource=admin"
            upsert_env "JWT_ACCESS_SECRET" "$JWT_ACCESS_SECRET"
            upsert_env "OPENAI_API_KEY" "$OPENAI_API_KEY"
            if [ -n "${CORS_ORIGINS:-}" ]; then
              upsert_env "CORS_ORIGINS" "$CORS_ORIGINS"
            fi
            if [ -n "${SEED_PASSWORD:-}" ]; then
              upsert_env "SEED_PASSWORD" "$SEED_PASSWORD"
            fi
            if [ -n "${CADDY_HTTP_PORT:-}" ]; then
              upsert_env "CADDY_HTTP_PORT" "$CADDY_HTTP_PORT"
            fi
            if [ -n "${CADDY_HTTPS_PORT:-}" ]; then
              upsert_env "CADDY_HTTPS_PORT" "$CADDY_HTTPS_PORT"
            fi

            read_env() {
              local key="$1"
              if [ ! -f .env ]; then
                return 0
              fi
              grep -E "^${key}=" .env | tail -n 1 | cut -d '=' -f 2-
            }

            caddy_http_port="${CADDY_HTTP_PORT:-$(read_env CADDY_HTTP_PORT)}"
            caddy_https_port="${CADDY_HTTPS_PORT:-$(read_env CADDY_HTTPS_PORT)}"
            caddy_http_port="${caddy_http_port:-80}"
            caddy_https_port="${caddy_https_port:-443}"

            check_caddy_host_port() {
              local port="$1"
              local expected_container="hena-wadeena-caddy-1"
              local holders unexpected_holder_count

              holders="$(docker ps --format '{{.Names}}\t{{.Ports}}' | grep -F ":${port}->" || true)"
              unexpected_holder_count=0
              while IFS= read -r holder; do
                [ -z "$holder" ] && continue
                if [ "${holder%%$'\t'*}" != "$expected_container" ]; then
                  unexpected_holder_count=$((unexpected_holder_count + 1))
                fi
              done <<EOF
            $holders
            EOF

              if [ "$unexpected_holder_count" -gt 0 ]; then
                echo "ERROR: Host port ${port} is already published by another Docker container."
                echo "$holders"
                echo "Set CADDY_HTTP_PORT/CADDY_HTTPS_PORT in /opt/hena-wadeena/.env or free the conflicting listener before deploy."
                return 1
              fi

              if [ -z "$holders" ] && ss -ltnH "( sport = :${port} )" | grep -q .; then
                echo "ERROR: Host port ${port} is already in use by a non-Docker listener."
                ss -ltnp "( sport = :${port} )" || true
                echo "Set CADDY_HTTP_PORT/CADDY_HTTPS_PORT in /opt/hena-wadeena/.env or free the conflicting listener before deploy."
                return 1
              fi

              return 0
            }

            print_caddy_port_diagnostics() {
              local port="$1"
              echo "Set CADDY_HTTP_PORT/CADDY_HTTPS_PORT in /opt/hena-wadeena/.env or free the conflicting listener before deploy."
              docker ps --format 'table {{.Names}}\t{{.Ports}}\t{{.Status}}' | grep -F ":${port}->" || true
              ss -ltnp "( sport = :${port} )" || true
            }

            echo "==> Validating Caddy host ports"
            check_caddy_host_port "$caddy_http_port"
            check_caddy_host_port "$caddy_https_port"

            echo "==> Pulling images by SHA and tagging as :latest"
            pull_with_retry() {
              local image="$1"
              local attempt=1
              until docker pull "$image"; do
                if [ "$attempt" -ge 3 ]; then
                  echo "ERROR: Failed to pull $image after 3 attempts"
                  return 1
                fi
                echo "Pull failed (attempt $attempt/3), retrying in 10s..."
                attempt=$((attempt + 1))
                sleep 10
              done
            }
            for svc in identity market guide-booking map ai gateway; do
              pull_with_retry "ghcr.io/$GHCR_USER/hena-wadeena/$svc:$DEPLOY_SHA"
              docker tag "ghcr.io/$GHCR_USER/hena-wadeena/$svc:$DEPLOY_SHA" \
                "ghcr.io/$GHCR_USER/hena-wadeena/$svc:latest"
            done

            echo "==> Running migrations (sequential - shared drizzle tracking table)"
            docker compose run --rm -w /app/services/identity identity node dist/db/migrate.js
            docker compose run --rm -w /app/services/market market node dist/db/migrate.js
            docker compose run --rm -w /app/services/guide-booking guide-booking node dist/db/migrate.js
            docker compose run --rm -w /app/services/map map node dist/db/migrate.js

            echo "==> Restarting services"
            if ! docker compose up -d --wait --timeout 300 postgres redis qdrant mongodb identity market guide-booking map ai gateway; then
              echo "==> Service health check failed; collecting diagnostics"
              docker compose ps || true
              echo "==> AI logs"
              docker compose logs --tail 200 ai || true
              echo "==> Map logs"
              docker compose logs --tail 200 map || true
              echo "==> Gateway logs"
              docker compose logs --tail 120 gateway || true
              echo "==> MongoDB logs"
              docker compose logs --tail 120 mongodb || true
              echo "==> Qdrant logs"
              docker compose logs --tail 120 qdrant || true
              echo "==> Postgres logs"
              docker compose logs --tail 80 postgres || true
              exit 1
            fi
            docker compose up -d --wait --timeout 120 postgres redis qdrant identity market guide-booking map ai gateway
            # Start caddy without --wait (health depends on DNS/TLS - non-blocking)
            if ! docker compose up -d caddy; then
              echo "==> Caddy failed to start; collecting diagnostics"
              docker compose logs --tail 120 caddy || true
              print_caddy_port_diagnostics "$caddy_http_port"
              print_caddy_port_diagnostics "$caddy_https_port"
              exit 1
            fi

            echo "==> Cleaning up old images"
            docker image prune -f

            echo "==> Deploy complete"
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_PAT }}
          GHCR_USER: ${{ github.repository_owner }}
          DEPLOY_SHA: ${{ github.sha }}
          MONGO_INITDB_ROOT_USERNAME: ${{ secrets.MONGO_INITDB_ROOT_USERNAME }}
          MONGO_INITDB_ROOT_PASSWORD: ${{ secrets.MONGO_INITDB_ROOT_PASSWORD }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CORS_ORIGINS: ${{ vars.CORS_ORIGINS }}
          SEED_PASSWORD: ${{ secrets.SEED_PASSWORD }}
          CADDY_HTTP_PORT: ${{ vars.CADDY_HTTP_PORT }}
          CADDY_HTTPS_PORT: ${{ vars.CADDY_HTTPS_PORT }}
