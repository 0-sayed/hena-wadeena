---
name: Deploy

'on':
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build-images:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [ci]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: identity
            context: .
            dockerfile: services/identity/Dockerfile
          - service: market
            context: .
            dockerfile: services/market/Dockerfile
          - service: guide-booking
            context: .
            dockerfile: services/guide-booking/Dockerfile
          - service: map
            context: .
            dockerfile: services/map/Dockerfile
          - service: ai
            context: services/ai
            dockerfile: Dockerfile
          - service: gateway
            context: gateway
            dockerfile: Dockerfile
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/hena-wadeena/${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/hena-wadeena/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Deploy to Contabo
    runs-on: ubuntu-latest
    needs: [build-images]
    environment: production
    timeout-minutes: 10
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,DEPLOY_SHA
          script: |
            set -euo pipefail
            cd /opt/hena-wadeena

            echo "==> Logging into GHCR"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            echo "==> Resetting working tree"
            git reset --hard
            git clean -fd -e .env

            echo "==> Checking out built commit"
            git fetch origin main
            git checkout "$DEPLOY_SHA"

            echo "==> Pulling images by SHA and tagging as :latest"
            for svc in identity market guide-booking map ai gateway; do
              docker pull "ghcr.io/$GHCR_USER/hena-wadeena/$svc:$DEPLOY_SHA"
              docker tag "ghcr.io/$GHCR_USER/hena-wadeena/$svc:$DEPLOY_SHA" \
                "ghcr.io/$GHCR_USER/hena-wadeena/$svc:latest"
            done

            echo "==> Running migrations (sequential — shared drizzle tracking table)"
            docker compose run --rm -w /app/services/identity identity node dist/db/migrate.js
            docker compose run --rm -w /app/services/market market node dist/db/migrate.js
            docker compose run --rm -w /app/services/guide-booking guide-booking node dist/db/migrate.js
            docker compose run --rm -w /app/services/map map node dist/db/migrate.js

            echo "==> Restarting services"
            docker compose up -d --wait --timeout 120 postgres redis qdrant identity market guide-booking map ai gateway
            # Start caddy without --wait (health depends on DNS/TLS — non-blocking)
            docker compose up -d caddy

            echo "==> Cleaning up old images"
            docker image prune -f

            echo "==> Deploy complete"
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_PAT }}
          GHCR_USER: ${{ github.repository_owner }}
          DEPLOY_SHA: ${{ github.sha }}
