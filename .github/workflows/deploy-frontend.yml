name: Deploy Frontend to Contabo

on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'packages/types/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  build:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build types package
        run: pnpm --filter @hena-wadeena/types build

      - name: Build frontend
        run: pnpm --filter @hena-wadeena/web build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: apps/web/dist/
          retention-days: 1

  deploy:
    name: Deploy to Contabo
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CONTABO_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 158.220.105.104 >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            dist/ root@158.220.105.104:/var/www/hena-wadeena/

      - name: Reload Nginx
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            root@158.220.105.104 \
            "nginx -t && systemctl reload nginx"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_rsa
