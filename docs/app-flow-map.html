      const ALL_ROLES = [

        'INVESTOR',
        'REVIEWER',
        'ADMIN',
      ];

      const ROLE_ACCESS = {
        TOURIST: ['public', 'auth'],
        RESIDENT: ['public', 'auth'],
        STUDENT: ['public', 'auth'],
        FARMER: ['public', 'auth', 'role'],
        GUIDE: ['public', 'auth', 'role'],
        MERCHANT: ['public', 'auth', 'role'],
        DRIVER: ['public', 'auth', 'role'],
        INVESTOR: ['public', 'auth', 'role'],
        REVIEWER: ['public', 'auth', 'role'],
        ADMIN: ['public', 'auth', 'role', 'admin', 'global'],
      };

      // ── STATE ─────────────────────────────────────────────────────────────────────
      const S = {
        zoom: 0.3,
        pan: { x: 14, y: 14 },
        selected: null,
        activePreset: 'all',
        activeRole: null,
        activeFlow: null,
        visibleDomains: new Set(DOMAINS),
        dragging: false,
        dragStart: { x: 0, y: 0 },
        panStart: { x: 0, y: 0 },
      };

      // ── RENDER ────────────────────────────────────────────────────────────────────
      const SVGNS = 'http://www.w3.org/2000/svg';
      const svg = document.getElementById('svg-canvas');
      const CANVAS_W = 4500,
        CANVAS_H = 980;

      function mkEl(tag) {
        return document.createElementNS(SVGNS, tag);
      }

      function nodeVisible(n) {
        if (!S.visibleDomains.has(n.domain)) return false;
        if (n.access === 'global') return true;
        if (S.activeRole) {
          const allowed = ROLE_ACCESS[S.activeRole] || [];
          if (!allowed.includes(n.access)) return false;
          if (n.access === 'role' && n.roles) {
            if (!n.roles.includes(S.activeRole) && S.activeRole !== 'ADMIN') return false;
          }
        }
        return true;
      }

      function cubicPath(x1, y1, x2, y2) {
        const mid = (y1 + y2) / 2;
        return `M${x1},${y1} C${x1},${mid} ${x2},${mid} ${x2},${y2}`;
      }

      function render() {
        while (svg.firstChild) svg.removeChild(svg.firstChild);
        svg.setAttribute('width', String(CANVAS_W * S.zoom));
        svg.setAttribute('height', String(CANVAS_H * S.zoom));
        svg.setAttribute('viewBox', `0 0 ${CANVAS_W} ${CANVAS_H}`);

        // defs — arrowhead markers
        const defs = mkEl('defs');
        Object.entries(CONN_STYLE).forEach(([type, st]) => {
          const m = mkEl('marker');
          m.setAttribute('id', 'arr-' + type);
          m.setAttribute('markerWidth', '7');
          m.setAttribute('markerHeight', '5');
          m.setAttribute('refX', '6');
          m.setAttribute('refY', '2.5');
          m.setAttribute('orient', 'auto');
          const p = mkEl('polygon');
          p.setAttribute('points', '0 0, 7 2.5, 0 5');
          p.setAttribute('fill', st.stroke);
          m.appendChild(p);
          defs.appendChild(m);
        });
        svg.appendChild(defs);

        const g = mkEl('g');
        svg.appendChild(g);

        // Flow awareness
        const flowData = S.activeFlow ? FLOWS.find((f) => f.id === S.activeFlow) : null;
        const flowStepSet = flowData ? new Set(flowData.steps) : null;
        const flowStepIndex = flowData
          ? Object.fromEntries(flowData.steps.map((id, i) => [id, i + 1]))
          : {};

        // When a flow is active, show all nodes (non-flow ones dimmed); otherwise respect filters
        const visIds = flowStepSet
          ? new Set(nodes.map((n) => n.id))
          : new Set(nodes.filter(nodeVisible).map((n) => n.id));
        const nodeMap = Object.fromEntries(nodes.map((n) => [n.id, n]));

        // connections (drawn under nodes)
        connections.forEach((c) => {
          if (!visIds.has(c.from) || !visIds.has(c.to)) return;
          const nf = nodeMap[c.from],
            nt = nodeMap[c.to];
          if (!nf || !nt) return;
          const st = CONN_STYLE[c.type] || CONN_STYLE.nav;
          const x1 = nf.x + nf.w / 2,
            y1 = nf.y + nf.h;
          const x2 = nt.x + nt.w / 2,
            y2 = nt.y;
          const path = mkEl('path');
          path.setAttribute('d', cubicPath(x1, y1, x2, y2));
          path.setAttribute('fill', 'none');
          const isFlowConn = flowStepSet && flowStepSet.has(c.from) && flowStepSet.has(c.to);
          if (flowStepSet) {
            if (isFlowConn) {
              path.setAttribute('stroke', flowData.color);
              path.setAttribute('stroke-width', '2.5');
              path.setAttribute('stroke-opacity', '0.9');
            } else {
              path.setAttribute('stroke', st.stroke);
              path.setAttribute('stroke-width', String(st.w));
              path.setAttribute('stroke-opacity', '0.06');
              if (st.dash !== 'none') path.setAttribute('stroke-dasharray', st.dash);
            }
          } else {
            path.setAttribute('stroke', st.stroke);
            path.setAttribute('stroke-width', String(st.w));
            path.setAttribute('stroke-opacity', '0.45');
            if (st.dash !== 'none') path.setAttribute('stroke-dasharray', st.dash);
          }
          path.setAttribute('marker-end', 'url(#arr-' + c.type + ')');
          g.appendChild(path);
        });

        // nodes
        nodes
          .filter((n) => visIds.has(n.id))
          .forEach((n) => {
            const col = ACCESS_STYLE[n.access] || ACCESS_STYLE.public;
            const sel = S.selected === n.id;
            const inFlow = flowStepSet ? flowStepSet.has(n.id) : true;
            const stepNum = flowStepIndex[n.id];
            const grp = mkEl('g');
            grp.setAttribute('cursor', 'pointer');
            grp.setAttribute('data-id', n.id);
            if (flowStepSet && !inFlow) grp.setAttribute('opacity', '0.12');
            grp.addEventListener('click', () => selectNode(n.id));

            // glow for selected
            if (sel) {
              const glow = mkEl('rect');
              glow.setAttribute('x', String(n.x - 3));
              glow.setAttribute('y', String(n.y - 3));
              glow.setAttribute('width', String(n.w + 6));
              glow.setAttribute('height', String(n.h + 6));
              glow.setAttribute('rx', '8');
              glow.setAttribute('fill', 'none');
              glow.setAttribute('stroke', '#ffffff');
              glow.setAttribute('stroke-width', '1.5');
              glow.setAttribute('stroke-opacity', '0.3');
              grp.appendChild(glow);
            }

            // flow highlight ring
            if (inFlow && flowStepSet) {
              const fring = mkEl('rect');
              fring.setAttribute('x', String(n.x - 4));
              fring.setAttribute('y', String(n.y - 4));
              fring.setAttribute('width', String(n.w + 8));
              fring.setAttribute('height', String(n.h + 8));
              fring.setAttribute('rx', '9');
              fring.setAttribute('fill', 'none');
              fring.setAttribute('stroke', flowData.color);
              fring.setAttribute('stroke-width', '2');
              fring.setAttribute('stroke-opacity', '0.65');
              grp.appendChild(fring);
            }

            const rect = mkEl('rect');
            rect.setAttribute('x', String(n.x));
            rect.setAttribute('y', String(n.y));
            rect.setAttribute('width', String(n.w));
            rect.setAttribute('height', String(n.h));
            rect.setAttribute('rx', '6');
            rect.setAttribute('fill', col.fill);
            rect.setAttribute('stroke', sel ? '#ffffff' : col.stroke);
            rect.setAttribute('stroke-width', sel ? '2' : '1');
            grp.appendChild(rect);

            const lbl = mkEl('text');
            lbl.setAttribute('x', String(n.x + n.w / 2));
            lbl.setAttribute('y', String(n.y + 15.5));
            lbl.setAttribute('text-anchor', 'middle');
            lbl.setAttribute('fill', '#e6edf3');
            lbl.setAttribute('font-size', '11');
            lbl.setAttribute('font-weight', '600');
            lbl.setAttribute('font-family', 'system-ui,-apple-system,sans-serif');
            // truncate long labels
            const maxChars = 20;
            lbl.textContent =
              n.label.length > maxChars ? n.label.slice(0, maxChars - 1) + '…' : n.label;
            grp.appendChild(lbl);

            const rt = mkEl('text');
            rt.setAttribute('x', String(n.x + n.w / 2));
            rt.setAttribute('y', String(n.y + 30));
            rt.setAttribute('text-anchor', 'middle');
            rt.setAttribute('fill', col.stroke);
            rt.setAttribute('font-size', '8');
            rt.setAttribute('font-family', 'monospace');
            rt.setAttribute('opacity', '0.7');
            let rtxt = n.route;
            if (rtxt.length > 24) rtxt = rtxt.slice(0, 22) + '…';
            rt.textContent = rtxt;
            grp.appendChild(rt);

            // step number badge
            if (stepNum) {
              const bc = mkEl('circle');
              bc.setAttribute('cx', String(n.x + n.w - 8));
              bc.setAttribute('cy', String(n.y + 8));
              bc.setAttribute('r', '8');
              bc.setAttribute('fill', flowData.color);
              bc.setAttribute('stroke', '#0d1117');
              bc.setAttribute('stroke-width', '1.5');
              grp.appendChild(bc);
              const bt = mkEl('text');
              bt.setAttribute('x', String(n.x + n.w - 8));
              bt.setAttribute('y', String(n.y + 12));
              bt.setAttribute('text-anchor', 'middle');
              bt.setAttribute('fill', '#0d1117');
              bt.setAttribute('font-size', '9');
              bt.setAttribute('font-weight', '800');
              bt.setAttribute('font-family', 'system-ui,-apple-system,sans-serif');
              bt.textContent = String(stepNum);
              grp.appendChild(bt);
            }

            g.appendChild(grp);
          });

        // row labels (right edge)
        const rowLabels = [
          { text: 'PUBLIC PAGES', y: ROW.public + 26 },
          { text: 'AUTH FLOW', y: ROW.auth + 26 },
          { text: 'USER ACTIONS', y: ROW.actions + 26 },
          { text: 'PROFILE', y: ROW.profile + 26 },
          { text: 'DASHBOARDS', y: ROW.dashboards + 26 },
          { text: 'ADMIN', y: ROW.admin + 26 },
        ];
        rowLabels.forEach((r) => {
          const t = mkEl('text');
          t.setAttribute('x', String(CANVAS_W - 18));
          t.setAttribute('y', String(r.y));
          t.setAttribute('text-anchor', 'end');
          t.setAttribute('fill', '#21262d');
          t.setAttribute('font-size', '8.5');
          t.setAttribute('font-weight', '700');
          t.setAttribute('letter-spacing', '1.5');
          t.setAttribute('font-family', 'system-ui,-apple-system,sans-serif');
          t.textContent = r.text;
          g.appendChild(t);
        });

        // domain group labels
        const domainAnchors = [
          { label: 'TOURISM', nodeId: 'tourism' },
          { label: 'GUIDES', nodeId: 'guides' },
          { label: 'MARKETPLACE', nodeId: 'marketplace' },
          { label: 'LOGISTICS', nodeId: 'logistics' },
          { label: 'INVESTMENT', nodeId: 'investment' },
          { label: 'JOBS', nodeId: 'jobs' },
          { label: 'BENEFITS', nodeId: 'benefits' },
          { label: 'SEARCH', nodeId: 'search' },
        ];
        domainAnchors.forEach((d) => {
          const anchor = nodes.find((n) => n.id === d.nodeId);
          if (!anchor || !visIds.has(d.nodeId)) return;
          const t = mkEl('text');
          t.setAttribute('x', String(anchor.x));
          t.setAttribute('y', String(ROW.public - 14));
          t.setAttribute('fill', '#7d8590');
          t.setAttribute('font-size', '8');
          t.setAttribute('font-weight', '700');
          t.setAttribute('letter-spacing', '1.2');
          t.setAttribute('font-family', 'system-ui,-apple-system,sans-serif');
          t.textContent = d.label;
          g.appendChild(t);
        });

        // update stat bar
        const visible = nodes.filter((n) => visIds.has(n.id)).length;
        document.getElementById('stat-bar').textContent =
          `${visible} / ${nodes.length} pages · zoom ${Math.round(S.zoom * 100)}%`;

        updateInfo();
      }

      // ── NODE INSPECTOR ─────────────────────────────────────────────────────────────
      function selectNode(id) {
        S.selected = S.selected === id ? null : id;
        render();
      }

      function updateInfo() {
        const panel = document.getElementById('node-info');
        while (panel.firstChild) panel.removeChild(panel.firstChild);

        const n = nodes.find((x) => x.id === S.selected);
        if (!n) {
          const e = document.createElement('div');
          e.className = 'ni-empty';
          e.textContent = 'Click any node to inspect';
          panel.appendChild(e);
          return;
        }

        const title = document.createElement('div');
        title.className = 'ni-title';
        title.textContent = n.label;
        panel.appendChild(title);

        const route = document.createElement('div');
        route.className = 'ni-route';
        route.textContent = n.route;
        panel.appendChild(route);

        const badgeText = {
          public: 'Public',
          auth: 'Auth Required',
          role: 'Role-Gated',
          admin: 'Admin Only',
          global: 'Global Widget',
        };
        const badge = document.createElement('span');
        badge.className = 'ni-badge badge-' + n.access;
        badge.textContent = badgeText[n.access] || n.access;
        panel.appendChild(badge);

        if (n.roles && n.roles.length) {
          const roles = document.createElement('div');
          roles.className = 'ni-roles';
          roles.textContent = 'Roles: ' + n.roles.join(', ');
          panel.appendChild(roles);
        }

        const desc = document.createElement('div');
        desc.className = 'ni-desc';
        desc.textContent = n.desc;
        panel.appendChild(desc);

        if (n.tabs && n.tabs.length) {
          const sec = document.createElement('div');
          sec.className = 'ni-tabs';
          const lbl = document.createElement('div');
          lbl.className = 'ni-tab-label';
          lbl.textContent = 'Internal Tabs';
          sec.appendChild(lbl);
          n.tabs.forEach((t) => {
            const item = document.createElement('div');
            item.className = 'ni-tab-item';
            item.textContent = t;
            sec.appendChild(item);
          });
          panel.appendChild(sec);
        }

        if (n.features && n.features.length) {
          const sec = document.createElement('div');
          sec.className = 'ni-features';
          const lbl = document.createElement('div');
          lbl.className = 'ni-feat-label';
          lbl.textContent = 'Features';
          sec.appendChild(lbl);
          n.features.forEach((f) => {
            const item = document.createElement('div');
            item.className = 'ni-feat-item';
            item.textContent = f;
            sec.appendChild(item);
          });
          panel.appendChild(sec);
        }
      }

      // ── SIDEBAR ───────────────────────────────────────────────────────────────────
      function buildSidebar() {
        const presetsEl = document.getElementById('preset-btns');
        PRESETS.forEach((p) => {
          const btn = document.createElement('button');
          btn.className = 'preset-btn' + (p.id === S.activePreset ? ' active' : '');
          btn.textContent = p.label;
          btn.dataset.pid = p.id;
          btn.addEventListener('click', () => applyPreset(p.id));
          presetsEl.appendChild(btn);
        });

        const rolesEl = document.getElementById('role-btns');
        const allBtn = document.createElement('button');
        allBtn.className = 'role-btn active';
        allBtn.textContent = 'All Roles';
        allBtn.addEventListener('click', () => setRole(null));
        rolesEl.appendChild(allBtn);
        ALL_ROLES.forEach((r) => {
          const btn = document.createElement('button');
          btn.className = 'role-btn';
          btn.textContent = r;
          btn.dataset.role = r;
          btn.addEventListener('click', () => setRole(r));
          rolesEl.appendChild(btn);
        });

        const domEl = document.getElementById('domain-checks');
        DOMAINS.forEach((d) => {
          const label = document.createElement('label');
          label.className = 'domain-item';
          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.checked = true;
          cb.dataset.domain = d;
          cb.addEventListener('change', () => {
            if (cb.checked) S.visibleDomains.add(d);
            else S.visibleDomains.delete(d);
            render();
          });
          const span = document.createElement('span');
          span.textContent = d.charAt(0).toUpperCase() + d.slice(1);
          label.appendChild(cb);
          label.appendChild(span);
          domEl.appendChild(label);
        });
      }

      function applyPreset(id) {
        const p = PRESETS.find((x) => x.id === id);
        if (!p) return;
        S.activePreset = id;
        S.visibleDomains = new Set(p.domains);
        S.activeRole = p.role;
        S.selected = null;
        document
          .querySelectorAll('.preset-btn')
          .forEach((b) => b.classList.toggle('active', b.dataset.pid === id));
        document.querySelectorAll('#domain-checks input').forEach((cb) => {
          cb.checked = S.visibleDomains.has(cb.dataset.domain);
        });
        document.querySelectorAll('.role-btn').forEach((b) => {
          if (b.dataset.role) b.classList.toggle('active', b.dataset.role === S.activeRole);
          else b.classList.toggle('active', !S.activeRole);
        });
        render();
      }

      function setRole(role) {
        S.activeRole = role;
        document.querySelectorAll('.role-btn').forEach((b) => {
          if (b.dataset.role) b.classList.toggle('active', b.dataset.role === role);
          else b.classList.toggle('active', !role);
        });
        render();
      }

      // ── FLOWS ─────────────────────────────────────────────────────────────────────
      function fitToFlow(flowId) {
        const flow = FLOWS.find((f) => f.id === flowId);
        if (!flow) return;
        const flowNodes = nodes.filter((n) => flow.steps.includes(n.id));
        if (!flowNodes.length) return;
        const wrapEl = document.getElementById('canvas-wrap');
        const wW = wrapEl.clientWidth;
        const wH = wrapEl.clientHeight;
        const pad = 80;
        const minX = Math.min(...flowNodes.map((n) => n.x)) - pad;
        const maxX = Math.max(...flowNodes.map((n) => n.x + n.w)) + pad;
        const minY = Math.min(...flowNodes.map((n) => n.y)) - pad;
        const maxY = Math.max(...flowNodes.map((n) => n.y + n.h)) + pad;
        const cW = maxX - minX;
        const cH = maxY - minY;
        S.zoom = Math.min(Math.max(0.12, Math.min(wW / cW, wH / cH)), 2.5);
        S.pan.x = wW / 2 - (minX + cW / 2) * S.zoom;
        S.pan.y = wH / 2 - (minY + cH / 2) * S.zoom;
        svg.style.transform = `translate(${S.pan.x}px,${S.pan.y}px)`;
      }

      function setFlow(id) {
        S.activeFlow = S.activeFlow === id ? null : id;
        document.querySelectorAll('.flow-btn').forEach((b) => {
          b.classList.toggle('active', b.dataset.fid === S.activeFlow);
        });
        const clearBtn = document.getElementById('flow-clear-btn');
        if (clearBtn) clearBtn.style.display = S.activeFlow ? 'block' : 'none';
        if (S.activeFlow) fitToFlow(S.activeFlow);
        render();
      }

      function buildFlows() {
        const container = document.getElementById('flow-btns');
        if (!container) return;
        const clearBtn = document.createElement('button');
        clearBtn.id = 'flow-clear-btn';
        clearBtn.style.display = 'none';
        clearBtn.textContent = '\u2715 Clear flow highlight';
        clearBtn.addEventListener('click', () => setFlow(S.activeFlow));
        container.appendChild(clearBtn);
        FLOWS.forEach((f) => {
          const btn = document.createElement('button');
          btn.className = 'flow-btn';
          btn.dataset.fid = f.id;
          btn.style.borderLeft = '3px solid ' + f.color;
          btn.addEventListener('click', () => setFlow(f.id));
          const name = document.createElement('span');
          name.className = 'flow-btn-name';
          name.textContent = f.label;
          btn.appendChild(name);
          const desc = document.createElement('span');
          desc.className = 'flow-btn-desc';
          desc.textContent = f.desc;
          btn.appendChild(desc);
          const steps = document.createElement('span');
          steps.className = 'flow-btn-steps';
          steps.textContent = f.steps.length + ' steps';
          btn.appendChild(steps);
          container.appendChild(btn);
        });
      }

      // ── PAN & ZOOM ─────────────────────────────────────────────────────────────────
      const wrap = document.getElementById('canvas-wrap');
      wrap.addEventListener('mousedown', (e) => {
        if (e.target.closest('[data-id]')) return;
        S.dragging = true;
        S.dragStart = { x: e.clientX, y: e.clientY };
        S.panStart = { x: S.pan.x, y: S.pan.y };
        svg.classList.add('panning');
      });
      window.addEventListener('mousemove', (e) => {
        if (!S.dragging) return;
        S.pan.x = S.panStart.x + (e.clientX - S.dragStart.x);
        S.pan.y = S.panStart.y + (e.clientY - S.dragStart.y);
        svg.style.transform = `translate(${S.pan.x}px,${S.pan.y}px)`;
      });
      window.addEventListener('mouseup', () => {
        S.dragging = false;
        svg.classList.remove('panning');
      });
      wrap.addEventListener(
        'wheel',
        (e) => {
          e.preventDefault();
          S.zoom = Math.min(2.5, Math.max(0.12, S.zoom + (e.deltaY > 0 ? -0.04 : 0.04)));
          render();
        },
        { passive: false },
      );
      document.getElementById('btn-zin').addEventListener('click', () => {
        S.zoom = Math.min(2.5, S.zoom + 0.1);
        render();
      });
      document.getElementById('btn-zout').addEventListener('click', () => {
        S.zoom = Math.max(0.12, S.zoom - 0.1);
        render();
      });
      document.getElementById('btn-zreset').addEventListener('click', () => {
        S.zoom = 0.3;
        S.pan = { x: 14, y: 14 };
        svg.style.transform = `translate(${S.pan.x}px,${S.pan.y}px)`;
        render();
      });

      // ── INIT ──────────────────────────────────────────────────────────────────────
      svg.style.transform = `translate(${S.pan.x}px,${S.pan.y}px)`;
      buildSidebar();
      buildFlows();
      render();
    </script>
  </body>
</html>
