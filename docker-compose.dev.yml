# Development overrides — usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
name: hena-wadeena-dev

services:
  postgres:
    ports:
      - '${POSTGRES_PORT:-5432}:5432'

  mongodb:
    ports:
      - '${MONGODB_PORT:-27017}:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-changeme}
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'mongosh --quiet --username ${MONGO_INITDB_ROOT_USERNAME:-admin} --password ${MONGO_INITDB_ROOT_PASSWORD:-changeme} --authenticationDatabase admin --eval "db.adminCommand({ ping: 1 }).ok" | grep 1',
        ]

  redis:
    # No auth in dev
    command: redis-server --appendonly yes

  qdrant:
    ports:
      - '${QDRANT_PORT:-6333}:6333'
      - '${QDRANT_GRPC_PORT:-6334}:6334'

  # NestJS services: hot-reload with volume mounts
  identity:
    build:
      target: development
    ports:
      - '8001:8001'
    volumes:
      - ./services/identity:/app/services/identity:delegated
      - ./packages:/app/packages:delegated
      - /app/node_modules
    command: pnpm --filter @hena-wadeena/identity run dev
    environment:
      NODE_ENV: development

  market:
    build:
      target: development
    ports:
      - '8002:8002'
    volumes:
      - ./services/market:/app/services/market:delegated
      - ./packages:/app/packages:delegated
      - /app/node_modules
    command: pnpm --filter @hena-wadeena/market run dev
    environment:
      NODE_ENV: development

  guide-booking:
    build:
      target: development
    ports:
      - '8003:8003'
    volumes:
      - ./services/guide-booking:/app/services/guide-booking:delegated
      - ./packages:/app/packages:delegated
      - /app/node_modules
    command: pnpm --filter @hena-wadeena/guide-booking run dev
    environment:
      NODE_ENV: development

  map:
    build:
      target: development
    ports:
      - '8004:8004'
    volumes:
      - ./services/map:/app/services/map:delegated
      - ./packages:/app/packages:delegated
      - /app/node_modules
    command: pnpm --filter @hena-wadeena/map run dev
    environment:
      NODE_ENV: development

  ai:
    ports:
      - '8005:8005'
    volumes:
      - ./services/ai:/app:delegated
    command: uv run uvicorn src.main:app --reload --host 0.0.0.0 --port 8005
    environment:
      ENVIRONMENT: development
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-changeme}@mongodb:27017/${MONGODB_DB_NAME:-nakheel_db}?authSource=admin
      BOOTSTRAP_KNOWLEDGE_BASE_ON_STARTUP: ${BOOTSTRAP_KNOWLEDGE_BASE_ON_STARTUP:-false}
      BOOTSTRAP_KNOWLEDGE_BASE_FILE: ${BOOTSTRAP_KNOWLEDGE_BASE_FILE:-./nakheel/bootstrap/datasets/new_valley_2026.json}

  gateway:
    ports:
      - '${GATEWAY_PORT:-8000}:80'
