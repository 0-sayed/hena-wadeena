version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable pnpm
        - pnpm install --frozen-lockfile
        - pnpm --filter @hena-wadeena/types build
    build:
      commands:
        - pnpm --filter @hena-wadeena/web build
  artifacts:
    baseDirectory: apps/web/dist
    files:
      - '**/*'
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: Cache-Control
          value: 'public, max-age=31536000, immutable'
    - pattern: 'index.html'
      headers:
        - key: Cache-Control
          value: 'no-cache'
  cache:
    paths:
      - node_modules/**/*
